<title>2026 MLB Draft Hub</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/styles.css">

<nav class="navbar">
  <span class="navbar-brand">2026 MLB Draft Hub</span>
  <div style="display:flex;gap:.25rem;flex-wrap:wrap;margin-left:1rem;">
    <button class="active" data-tab="rankings">Rankings</button>
    <button data-tab="search">Search</button>
    <button data-tab="projections">Projections</button>
    <button data-tab="simulator">Simulator</button>
    <button data-tab="teams">Teams</button>
    <button data-tab="community">Community Drafts</button>
  </div>
</nav>

<div class="main-content">
  <div id="tab-rankings"   class="tab-panel active"></div>
  <div id="tab-search"     class="tab-panel"></div>
  <div id="tab-projections" class="tab-panel"></div>
  <div id="tab-simulator"  class="tab-panel"></div>
  <div id="tab-teams"      class="tab-panel"></div>
  <div id="tab-community"  class="tab-panel"></div>
</div>

<!-- Player modal -->
<div class="modal fade" id="playerModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="player-modal-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="player-modal-body"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/app.js"></script>
