name: Deploy to GitHub Pages

# Exports the Shiny app to a static (shinylive/Pyodide) site and publishes it to
# GitHub Pages. Runs on pushes that touch the app or its data, and on demand.

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install shinylive exporter
        run: pip install shiny shinylive
      - name: Inject GitHub PAT for community drafts
        run: |
          sed -i "s/DRAFT_PAT_PLACEHOLDER/${{ secrets.DRAFT_PAT }}/g" app/config.py
      - name: Export static site
        run: shinylive export app _site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
