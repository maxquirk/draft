name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "static/**"
      - "scripts/build_static.py"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build data JSONs
        run: python scripts/build_static.py
      - name: Copy static site
        run: cp -r static/. _site/
      - name: Inject GitHub PAT for community drafts
        run: sed -i "s/DRAFT_PAT_PLACEHOLDER/${{ secrets.DRAFT_PAT }}/g" _site/js/config.js
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
