name: Refresh draft data

# Re-runs the scraper weekly (and on demand), commits any changed data files in
# app/data/, and lets the resulting push trigger the Pages deploy.

on:
  schedule:
    - cron: "0 11 * * 1"   # Mondays 11:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: browser-actions/setup-chrome@v1
        with:
          install-chromedriver: true
      - name: Install scraper deps
        run: pip install -e ".[scraper]"
      - name: Run scraper
        run: python -m scraper.run
      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/*.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh 2026 draft data [skip ci]"
            git push
          fi
